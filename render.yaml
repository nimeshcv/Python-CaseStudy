services:
  - type: web
    name: attendance-system
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python manage.py migrate --noinput && gunicorn AttendanceSystem.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-system-db
          property: connectionString

databases:
  - name: attendance-system-db
    plan: free
